<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>切 | CUT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Crimson+Pro:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a; color: #d4d4d4;
    font-family: 'Noto Serif SC', 'Crimson Pro', serif;
    height: 100vh; display: flex;
    justify-content: center; align-items: center; overflow: hidden;
  }
  #game { max-width: 640px; width: 90%; padding: 40px; position: relative; }

  /* Nav buttons - top right */
  #nav-buttons {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    display: flex; gap: 14px;
  }
  #nav-buttons button {
    background: none; border: none; color: #666; font-size: 14px;
    cursor: pointer; transition: color 0.3s;
  }
  #nav-buttons button:hover { color: #888; }

  /* Settings panel */
  #settings-panel {
    display: none; position: fixed; top: 0; right: 0;
    width: 260px; height: 100vh; background: #111; border-left: 1px solid #222;
    padding: 60px 24px 24px; z-index: 99;
  }
  #settings-panel h3 { color: #c9a96e; font-size: 14px; letter-spacing: 3px; margin-bottom: 20px; }
  .setting-row { margin-bottom: 20px; }
  .setting-label { color: #666; font-size: 13px; margin-bottom: 8px; }
  .lang-btn {
    font-family: 'Noto Serif SC', serif; font-size: 14px;
    background: none; border: 1px solid #222; color: #666;
    padding: 8px 16px; cursor: pointer; margin-right: 8px; transition: all 0.3s;
  }
  .lang-btn.active { color: #e8e8e8; border-color: #666; }
  .lang-btn:hover { color: #e8e8e8; border-color: #666; }

  /* Title screen */
  #title-screen { text-align: center; animation: fadeIn 2s ease; }
  #title-screen h1 { font-size: 72px; font-weight: 700; color: #e8e8e8; margin-bottom: 40px; letter-spacing: 8px; }
  #title-screen .start-btn {
    font-family: 'Noto Serif SC', 'Crimson Pro', serif; font-size: 16px; color: #888;
    background: none; border: 1px solid #333; padding: 12px 40px;
    cursor: pointer; letter-spacing: 4px; transition: all 0.3s ease;
  }
  #title-screen .start-btn:hover { color: #e8e8e8; border-color: #888; }

  /* Story */
  #story-screen { display: none; overflow-y: auto; max-height: 80vh; }
  #text-container { min-height: 300px; line-height: 2; font-size: 16px; letter-spacing: 1px; }
  #text-container .line { opacity: 0; animation: lineIn 0.5s ease forwards; margin-bottom: 8px; }
  #text-container .line.ending { color: #c9a96e; font-weight: 700; margin-top: 20px; }

  /* Choices */
  #choices { margin-top: 40px; display: flex; flex-direction: column; gap: 12px; }
  #choices button {
    font-family: 'Noto Serif SC', 'Crimson Pro', serif; font-size: 15px; color: #888;
    background: none; border: 1px solid #222; padding: 14px 20px;
    cursor: pointer; text-align: left; transition: all 0.3s ease; letter-spacing: 1px;
  }
  #choices button:hover { color: #e8e8e8; border-color: #666; padding-left: 28px; }
  #choices button .choice-num { color: #c9a96e; margin-right: 12px; }

  /* End buttons */
  #restart { display: none; margin-top: 40px; }
  #restart button {
    font-family: 'Noto Serif SC', 'Crimson Pro', serif; font-size: 14px; color: #666;
    background: none; border: 1px solid #222; padding: 10px 30px;
    cursor: pointer; letter-spacing: 2px; transition: all 0.3s ease;
  }
  #restart button:hover { color: #e8e8e8; border-color: #666; }

  /* Cursor */
  .cursor-blink::after { content: '▍'; animation: blink 1s step-end infinite; color: #c9a96e; }

  /* Scene Tree */
  #scene-map { padding: 20px 0; }
  .tree-container { overflow-x: auto; padding: 20px 0; }
  .tree-node {
    font-family: 'Noto Serif SC', 'Crimson Pro', serif; font-size: 13px;
    background: none; border: 1px solid #222; color: #555;
    padding: 10px 16px; cursor: default; white-space: nowrap;
    transition: all 0.3s; letter-spacing: 1px; display: flex; align-items: center; margin: 4px 0;
  }
  .tree-node.unlocked { color: #888; cursor: pointer; border-color: #333; }
  .tree-node.unlocked:hover { color: #e8e8e8; border-color: #666; }
  .tree-node.ending { border-color: #c9a96e33; }
  .tree-node.ending.unlocked { border-color: #c9a96e66; color: #c9a96e; }


  /* Custom Modal */
  #modal-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); z-index: 200;
    justify-content: center; align-items: center;
  }
  #modal-overlay.show { display: flex; }
  #modal-box {
    background: #111; border: 1px solid #333; padding: 30px 40px;
    max-width: 320px; text-align: center;
  }
  #modal-text { color: #d4d4d4; font-size: 15px; margin-bottom: 24px; letter-spacing: 1px; line-height: 1.6; }
  #modal-buttons { display: flex; gap: 12px; justify-content: center; }
  #modal-buttons button {
    font-family: 'Noto Serif SC', 'Crimson Pro', serif; font-size: 14px;
    background: none; border: 1px solid #333; color: #888; padding: 8px 24px;
    cursor: pointer; transition: all 0.3s; letter-spacing: 1px;
  }
  #modal-buttons button:hover { color: #e8e8e8; border-color: #666; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes lineIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>

const textContainer = document.getElementById('text-container');
const choicesContainer = document.getElementById('choices');
const restartBtn = document.getElementById('restart');
const typeSpeed = 50;

function updateUI() {
  const u = ui[lang];
  document.getElementById('game-title').textContent = u.title;
  document.getElementById('start-btn').textContent = u.enter;
  document.getElementById('restart-btn').textContent = u.restart;
  document.getElementById('map-btn').textContent = u.chapters;
  document.getElementById('settings-title').textContent = u.settings;
  document.getElementById('lang-label').textContent = u.langLabel;
  document.getElementById('btn-zh').className = 'lang-btn' + (lang === 'zh' ? ' active' : '');
  document.getElementById('btn-en').className = 'lang-btn' + (lang === 'en' ? ' active' : '');
}

function setLang(l) {
  lang = l;
  localStorage.setItem('lang', l);
  updateUI();
}

function toggleSettings() {
  const panel = document.getElementById('settings-panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('story-screen').style.display = 'block';
  playScene('start');
}

async function playScene(sceneId) {
  skipTyping = false;
  currentSceneId = sceneId;
  const scene = story[sceneId];
  if (!scene) return;
  unlock(sceneId);
  textContainer.innerHTML = '';
  choicesContainer.innerHTML = '';
  restartBtn.style.display = 'none';

  const lines = scene.text[lang] || scene.text.zh;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const div = document.createElement('div');
    div.className = 'line';
    if (line.startsWith('\u3010')) div.classList.add('ending');
    textContainer.appendChild(div);
    await typeText(div, line);
    await delay(300);
  }

  const choices = scene.choices[lang] || scene.choices.zh;
  if (choices.length === 0) {
    markEnding(sceneId);
    if (allEndingsSeen() && !localStorage.getItem('prologueDone')) {
      // Show "继续" button
      const contDiv = document.createElement('div');
      contDiv.style.cssText = 'margin-top:40px;';
      const contBtn = document.createElement('button');
      contBtn.id = 'continue-btn';
      contBtn.textContent = lang === 'zh' ? '继续' : 'Continue';
      contBtn.style.cssText = 'font-family:Noto Serif SC,Crimson Pro,serif;font-size:16px;color:#c9a96e;background:none;border:1px solid #c9a96e44;padding:12px 40px;cursor:pointer;letter-spacing:4px;transition:all 0.3s;';
      contBtn.onmouseenter = () => { contBtn.style.borderColor = '#c9a96e'; };
      contBtn.onmouseleave = () => { contBtn.style.borderColor = '#c9a96e44'; };
      contBtn.onclick = () => playEpilogue();
      restartBtn.parentNode.insertBefore(contDiv, restartBtn);
      contDiv.appendChild(contBtn);
    }
    restartBtn.style.display = 'block';
    return;
  }

  await delay(500);
  choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.innerHTML = '<span class="choice-num">' + (i+1) + '.</span>' + choice.text;
    btn.onclick = () => playScene(choice.next);
    choicesContainer.appendChild(btn);
  });
}

function typeText(el, text) {
  return new Promise(resolve => {
    if (!text) { resolve(); return; }
    if (skipTyping) {
      el.textContent = text;
      resolve();
      return;
    }
    let i = 0;
    el.classList.add('cursor-blink');
    const interval = setInterval(() => {
      if (skipTyping) {
        el.textContent = text;
        clearInterval(interval);
        el.classList.remove('cursor-blink');
        resolve();
        return;
      }
      el.textContent = text.slice(0, i + 1);
      i++;
      if (i >= text.length) {
        clearInterval(interval);
        el.classList.remove('cursor-blink');
        resolve();
      }
    }, typeSpeed);
  });
}

function delay(ms) { return new Promise(r => setTimeout(r, skipTyping ? 0 : ms)); }

// Unlock tracking
const unlocked = JSON.parse(localStorage.getItem('unlocked') || '["start"]');
function unlock(id) {
  if (!unlocked.includes(id)) { unlocked.push(id); localStorage.setItem('unlocked', JSON.stringify(unlocked)); }
}


// Track endings seen
const allEndings = ['just_sleep', 'learn_coding', 'ask_parents', 'frugal'];
const seenEndings = JSON.parse(localStorage.getItem('seenEndings') || '[]');
function markEnding(id) {
  if (allEndings.includes(id) && !seenEndings.includes(id)) {
    seenEndings.push(id);
    localStorage.setItem('seenEndings', JSON.stringify(seenEndings));
  }
}
function allEndingsSeen() { return allEndings.every(e => seenEndings.includes(e)); }

const sceneNamesI18n = {
  zh: { start: "开始", keep_working: "继续打工", quit: "辞职", just_sleep: "钝刀", learn_coding: "丰饶的荒漠", ask_parents: "笼", frugal: "饿殍" },
  en: { start: "Start", keep_working: "Keep Working", quit: "Quit", just_sleep: "Dull Blade", learn_coding: "Desert of Plenty", ask_parents: "The Cage", frugal: "Famine" }
};
const sceneTree = { start: ["keep_working", "quit"], keep_working: ["just_sleep", "learn_coding"], quit: ["ask_parents", "frugal"] };

const endings = ['just_sleep', 'learn_coding', 'ask_parents', 'frugal'];

function showMap() {
  const map = document.getElementById('scene-map');
  if (map.style.display !== 'none') {
    map.style.display = 'none';
    document.getElementById('text-container').style.display = '';
    document.getElementById('choices').style.display = '';
    document.getElementById('restart').style.display = '';
    return;
  }
  // Hide story content, show map fullscreen
  document.getElementById('text-container').style.display = 'none';
  document.getElementById('choices').style.display = 'none';
  document.getElementById('restart').style.display = 'none';
  map.style.display = 'block'; map.innerHTML = '';
  const names = sceneNamesI18n[lang];

  const title = document.createElement('div');
  title.textContent = lang === 'zh' ? '章节选择' : 'Chapters';
  title.style.cssText = 'color:#c9a96e;font-size:18px;letter-spacing:4px;margin-bottom:24px;';
  map.appendChild(title);

  const container = document.createElement('div');
  container.className = 'tree-container';

  function makeNode(id) {
    const ok = unlocked.includes(id);
    const isEnd = endings.includes(id);
    const btn = document.createElement('div');
    btn.className = 'tree-node' + (ok ? ' unlocked' : '') + (isEnd ? ' ending' : '');
    btn.textContent = ok ? names[id] : '???';
    if (ok) {
      btn.onclick = () => {
        map.style.display = 'none';
        document.getElementById('text-container').style.display = '';
        document.getElementById('choices').style.display = '';
        document.getElementById('restart').style.display = '';
        document.getElementById('title-screen').style.display = 'none';
        document.getElementById('story-screen').style.display = 'block';
        playScene(id);
      };
    }
    return btn;
  }

  function buildTree(id) {
    const group = document.createElement('div');
    group.style.cssText = 'display:flex;align-items:center;';

    const node = makeNode(id);
    group.appendChild(node);

    const children = sceneTree[id];
    if (children && children.length > 0) {
      // Connector line
      const conn = document.createElement('div');
      conn.style.cssText = 'width:24px;height:1px;background:#333;flex-shrink:0;';
      group.appendChild(conn);

      // Children column with vertical line
      const childCol = document.createElement('div');
      childCol.style.cssText = 'display:flex;flex-direction:column;position:relative;';

      // Vertical line
      if (children.length > 1) {
        const vline = document.createElement('div');
        vline.style.cssText = 'position:absolute;left:0;top:50%;width:1px;background:#333;';
        // Will be sized after render
        childCol._vline = vline;
        childCol.appendChild(vline);
      }

      children.forEach((childId, i) => {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;margin:4px 0;';

        const hconn = document.createElement('div');
        hconn.style.cssText = 'width:24px;height:1px;background:#333;flex-shrink:0;';
        row.appendChild(hconn);

        const subtree = buildTree(childId);
        row.appendChild(subtree);
        childCol.appendChild(row);
      });

      group.appendChild(childCol);
    }

    return group;
  }

  const tree = buildTree('start');
  container.appendChild(tree);
  map.appendChild(container);

  // Fix vertical lines after render
  requestAnimationFrame(() => {
    map.querySelectorAll('div').forEach(el => {
      if (el._vline) {
        const rows = Array.from(el.children).filter(c => c !== el._vline);
        if (rows.length >= 2) {
          const first = rows[0];
          const last = rows[rows.length - 1];
          const top = first.offsetTop + first.offsetHeight / 2;
          const bottom = last.offsetTop + last.offsetHeight / 2;
          el._vline.style.top = top + 'px';
          el._vline.style.height = (bottom - top) + 'px';
        }
      }
    });
  });
}


// Custom modal
let modalCallback = null;
function showModal(text, yesText, noText, onYes) {
  document.getElementById('modal-text').textContent = text;
  document.getElementById('modal-yes').textContent = yesText;
  document.getElementById('modal-no').textContent = noText;
  document.getElementById('modal-overlay').className = 'show';
  modalCallback = onYes;
  document.getElementById('modal-yes').onclick = () => { closeModal(); if (modalCallback) modalCallback(); };
}
function closeModal() {
  document.getElementById('modal-overlay').className = '';
  modalCallback = null;
}

function goHome() {
  const msg = lang === 'zh' ? '返回首页？当前进度不会保存。' : 'Return to home? Progress won\'t be saved.';
  const yes = lang === 'zh' ? '确定' : 'Yes';
  const no = lang === 'zh' ? '取消' : 'Cancel';
  showModal(msg, yes, no, () => { window.location.href = '../'; });
}

function restartGame() {
  const msg = lang === 'zh' ? '重新开始？' : 'Restart?';
  const yes = lang === 'zh' ? '确定' : 'Yes';
  const no = lang === 'zh' ? '取消' : 'Cancel';
  showModal(msg, yes, no, () => { location.reload(); });
}


// Fast-forward: click/tap to skip typewriter animation
let skipTyping = false;
document.getElementById('game').addEventListener('click', (e) => {
  // Don't skip if clicking a button
  if (e.target.tagName === 'BUTTON' || e.target.closest('button') || e.target.closest('#nav-buttons') || e.target.closest('#settings-panel') || e.target.closest('#scene-map')) return;
  skipTyping = true;
});

// Track current scene for language switch
let currentSceneId = null;


// Meta epilogue - after all endings seen
async function playEpilogue() {
  skipTyping = false;
  textContainer.innerHTML = '';
  choicesContainer.innerHTML = '';
  restartBtn.style.display = 'none';
  // Remove continue button
  const cb = document.getElementById('continue-btn');
  if (cb && cb.parentNode) cb.parentNode.remove();

  // Screen goes black, then "open eyes" effect
  const game = document.getElementById('game');
  game.style.transition = 'opacity 1s';
  game.style.opacity = '0';
  await delay(1500);
  game.style.opacity = '1';

  const lines = lang === "zh" ? [
    "“你喜欢哪个结局？”",
    "",
    "“我没有喜欢的结局，因为都不是好结局。”",
    "",
    "“可是我发自内心地觉得，这些就是我的结局。”",
    "",
    "“不行。”",
  ] : [
    "\u201cWhich ending did you like?\u201d",
    "",
    "\u201cNone of them. Because none of them were good endings.\u201d",
    "",
    "\u201cBut deep down, I believe that is all I deserve.\u201d",
    "",
    "\u201cNo.\u201d",
  ];

  for (const line of lines) {
    const div = document.createElement('div');
    div.className = 'line';
    textContainer.appendChild(div);
    await typeText(div, line);
    await delay(line === '' ? 100 : line.startsWith('"') ? 600 : 400);
  }

  await delay(1000);

  // Mark prologue as done
  localStorage.setItem('prologueDone', 'true');

  // Show button to go to chapter 1
  const nextDiv = document.createElement('div');
  nextDiv.style.cssText = 'margin-top:40px;text-align:center;';
  const nextBtn = document.createElement('button');
  nextBtn.textContent = lang === 'zh' ? '第一章' : 'Chapter One';
  nextBtn.style.cssText = 'font-family:Noto Serif SC,Crimson Pro,serif;font-size:16px;color:#c9a96e;background:none;border:1px solid #c9a96e44;padding:12px 40px;cursor:pointer;letter-spacing:4px;transition:all 0.3s;animation:fadeIn 2s ease;';
  nextBtn.onmouseenter = () => { nextBtn.style.borderColor = '#c9a96e'; };
  nextBtn.onmouseleave = () => { nextBtn.style.borderColor = '#c9a96e44'; };
  nextBtn.onclick = () => { window.location.href = '../ch1/'; };
  nextDiv.appendChild(nextBtn);
  textContainer.appendChild(nextDiv);

  // Also show restart/home
  restartBtn.style.display = 'block';
}

updateUI();
